name: Greeting on variable day

on:
  workflow_dispatch

env:
  DAY_OF_WEEK: Monday   #Global ENV

jobs:
  greeting_job:
    runs-on: ubuntu-latest
    env:
      Greeting: Hello  #JOB level ENV
    steps:
      - name: "Say Hello Mona it's Monday"
        run: echo "$Greeting $First_Name. Today is $DAY_OF_WEEK!"
        env:
          First_Name: Mona  #Step level ENV
